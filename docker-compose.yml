services:
  vault:
    image: vault:1.13.3
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: ${VAULT_DEV_LISTEN_ADDRESS}
    command: server -dev -dev-root-token-id=${VAULT_DEV_ROOT_TOKEN_ID}

  vault-init:
    image: curlimages/curl:8.5.0
    depends_on:
      - vault
    entrypoint: >
      sh -c "
        sleep 3 &&
        curl --header 'X-Vault-Token: ${VAULT_TOKEN}' --request POST --data '{\"data\": {\"username\": \"${VAULT_INIT_USERNAME}\", \"password\": \"${VAULT_INIT_PASSWORD}\", \"jwtsecret\": \"${VAULT_INIT_JWTSECRET}\"}}' http://vault:8200/v1/secret/data/myapp
      "

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5454:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
  
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - LOCALSTACK_AUTH_TOKEN=ls-zinE2711-dENE-VAJo-8244-GiBemAZA551f
    #volumes:
      #- ./localstack-data:/tmp/localstack/data

  api:
    build:
      context: ./ApiControllerProject
      dockerfile: Dockerfile
    environment:
      Vault__Uri: "http://vault:8200"
      Vault__Token: ${VAULT_TOKEN}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    ports:
      - "5043:5043"
    depends_on:
      - vault
      - vault-init
      - db
      - localstack

volumes:
  pgdata: