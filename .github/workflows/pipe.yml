name: .NET Smoke Tests

on:
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build API project
      run: dotnet build ApiPortfolioProject/ApiPortfolioProject.csproj --no-restore --configuration Release

    - name: Build Playwright project
      run: dotnet build PlaywrightProject/PlaywrightProject.csproj --no-restore --configuration Release

    - name: Start Vault in Docker
      run: |
        docker run -d --name vault -e 'VAULT_DEV_ROOT_TOKEN_ID=myroot' -e 'VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200' -p 8200:8200 vault:latest
        for i in {1..10}; do
          if curl http://localhost:8200/v1/sys/health > /dev/null 2>&1; then
            echo "Vault is up!"
            break
          fi
          echo "Waiting for Vault to start..."
          sleep 2
        done

    - name: Set environment variables
      run: |
        echo "VAULT_URI=http://localhost:8200" >> $GITHUB_ENV
        echo "VAULT_TOKEN=myroot" >> $GITHUB_ENV
        echo "API_BASE_URL=http://localhost:5043" >> $GITHUB_ENV

    - name: Start API in background
      run: |
        dotnet run --no-build --configuration Release --project ApiPortfolioProject/ApiPortfolioProject.csproj &
        for i in {1..30}; do
          if curl http://localhost:5043/swagger/index.html > /dev/null 2>&1; then
            echo "API is up!"
            break
          fi
          echo "Waiting for API to start..."
          sleep 2
        done

    - name: Install Playwright .NET Browsers
      run: pwsh PlaywrightProject/bin/Release/net8.0/playwright.ps1 install

    - name: Clean Allure results
      run: rm -rf allure-results

    - name: Run smoke tests
      run: dotnet test PlaywrightProject/PlaywrightProject.csproj --filter "Category=smoke" --no-build --configuration Release

    - name: Install Allure commandline
      run: npm install -g allure-commandline

    - name: Generate Allure report
      run: allure generate allure-results --clean -o allure-report

    - name: Upload Allure report as artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

    - name: Deploy Allure report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report