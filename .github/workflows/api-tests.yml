name: API Tests

on:
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Compose
        run: |
          docker compose version || docker-compose version

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl http://localhost:5043/swagger/index.html > /dev/null 2>&1; then
              echo "API is up!"
              break
            fi
            echo "Waiting for API to start..."
            sleep 2
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build CSharpPortfolioProject
        run: dotnet build ApiAndUiProject/ApiAndUiProject.csproj --no-restore --configuration Release

      - name: Install Playwright .NET Browsers
        run: pwsh ApiAndUiProject/bin/Release/net8.0/playwright.ps1 install

      - name: Clean Allure results
        run: rm -rf allure-results

      - name: Run API tests and save TRX results
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          VAULT_URI: ${{ secrets.VAULT_URI }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: dotnet test ApiAndUiProject/ApiAndUiProject.csproj --filter "Category=api" --no-build --configuration Release
      
      - name: Install Allure commandline
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report