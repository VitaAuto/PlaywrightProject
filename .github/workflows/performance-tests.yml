name: k6 Performance Tests

on:
  workflow_dispatch:

jobs:
  k6-performance-tests:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      VAULT_URI: ${{ secrets.VAULT_URI }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      VAULT_DEV_ROOT_TOKEN_ID: ${{ secrets.VAULT_DEV_ROOT_TOKEN_ID }}
      VAULT_DEV_LISTEN_ADDRESS: ${{ secrets.VAULT_DEV_LISTEN_ADDRESS }}
      VAULT_INIT_USERNAME: ${{ secrets.VAULT_INIT_USERNAME }}
      VAULT_INIT_PASSWORD: ${{ secrets.VAULT_INIT_PASSWORD }}
      VAULT_INIT_JWTSECRET: ${{ secrets.VAULT_INIT_JWTSECRET }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      ASPNETCORE_ENVIRONMENT: ${{ secrets.ASPNETCORE_ENVIRONMENT }}
      ASPNETCORE_URLS: ${{ secrets.ASPNETCORE_URLS }}
      GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker compose -f docker-compose.performance.yml up -d --build

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl http://localhost:5043/swagger/index.html > /dev/null 2>&1; then
              echo "API is up!"
              break
            fi
            echo "Waiting for API to be ready..."
            sleep 3
          done
          docker compose ps

      - name: Install k6
        run: |
          curl -L -o k6.tar.gz https://github.com/grafana/k6/releases/download/v0.48.0/k6-v0.48.0-linux-amd64.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-v0.48.0-linux-amd64/k6 /usr/local/bin/
          k6 version

      - name: Wait for Vault to be ready
        run: |
          for i in {1..30}; do
            if curl --header "X-Vault-Token: $VAULT_TOKEN" $VAULT_URI/v1/secret/data/myapp | grep -q 'username'; then
              echo "Vault secret is ready!"
              break
            fi
            echo "Waiting for Vault secret to be available..."
            sleep 3
          done

      - name: Get credentials from Vault (pwsh)
        shell: pwsh
        run: |
          $CREDS = Invoke-RestMethod -Headers @{"X-Vault-Token" = "${{ env.VAULT_TOKEN }}"} -Uri "${{ env.VAULT_URI }}/v1/secret/data/myapp"
          "K6_USERNAME=$($CREDS.data.data.username)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "K6_PASSWORD=$($CREDS.data.data.password)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Run k6 performance tests
        run: k6 run ApiAndUiProject/Tests/Performance/users-api-crud.js